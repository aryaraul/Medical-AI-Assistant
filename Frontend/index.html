<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
    <div class="header">
        <h1>Medical AI Assistant</h1>
        <p class="subtitle">
            AI-powered Clinical Documentation & Prescription Generator
        </p>
    </div>

    <div class="record-card">

        <h2>🎤 Live Medical Transcription</h2>

        <div class="buttons">

            <button id="startBtn">
                🎤 Start Recording
            </button>

            <button id="stopBtn">
                ⏹ Stop Recording
            </button>

            <button id="clearBtn">
                🗑 Clear
            </button>

        </div>

        <textarea
            id="transcript"
            placeholder="Start speaking... The doctor's conversation will appear here."
        ></textarea>

    </div>

    <div class="action">

        <button id="processBtn">
            Process with AI
        </button>

    </div>

    <div class="summary-card">

        <h2>Clinical Summary</h2>

        <textarea
            id="summary"
            placeholder="The AI-generated summary will appear here..."
            readonly
        ></textarea>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
